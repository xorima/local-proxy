name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  GO_VERSION: "1.26"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  vulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go test ./internal/...

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Start Squid test environment
        working-directory: test-env
        run: docker compose up -d --wait
      - name: Wait for Squid
        run: |
          for i in $(seq 30); do
            curl -s -o /dev/null -w "%{http_code}" -x http://user:pass@127.0.0.1:13128 http://example.com/ && break
            sleep 1
          done
      - run: go test -tags=integration -timeout 30s ./tests/
      - name: Cleanup
        if: always()
        working-directory: test-env
        run: docker compose down

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build binaries
        run: |
          mkdir -p dist
          for cmd in serve hashgen magic; do
            GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
              go build -o "dist/local-proxy-${cmd}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }}" \
              ./cmd/${cmd}
          done
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -o "dist/local-proxy-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }}" \
            .
      - uses: actions/upload-artifact@v4
        with:
          name: local-proxy-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
